<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumen i-PROPKES (Pasca) | ORBIX-P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-pattern { background-color: #0f172a; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-pattern min-h-screen text-slate-200">

    <!-- TOP NAVBAR -->
    <nav class="bg-slate-950/90 border-b border-slate-800 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-purple-600 text-white p-2 rounded-xl font-black text-xs">IAB</div>
                <h1 class="text-sm font-bold text-white uppercase">Instrumen i-PROPKES <span class="text-purple-400">(Pasca)</span></h1>
            </div>
            <a href="dashboard_peserta.html" class="text-xs text-slate-400 hover:text-white transition-colors flex items-center gap-1 font-semibold">
                ← Kembali
            </a>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <!-- HEADER HEADER -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h2 class="text-xl font-extrabold text-white">Soalan i-PROPKES (Ujian Pasca)</h2>
                <p class="text-xs text-slate-400 mt-1">Sila jawab kesemua 38 item soalan berdasarkan skala 1 (Sangat Rendah) hingga 10 (Sangat Tinggi).</p>
            </div>
            <div class="bg-slate-950 border border-slate-800 px-4 py-2 rounded-xl text-center shrink-0">
                <span class="text-xs text-slate-400 block font-semibold uppercase">Status Kemajuan</span>
                <span class="text-sm font-bold text-purple-400" id="progressCounter">0 / 38 Soalan</span>
            </div>
        </div>

        <!-- FORM SOALAN -->
        <form id="pascaForm" onsubmit="window.savePascaResults(event)" class="space-y-6">
            <div id="questionsContainer" class="space-y-6">
                <!-- 38 Soalan akan dijana secara dinamik oleh JavaScript -->
            </div>

            <!-- BUTTON HANTAR -->
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl flex justify-between items-center sticky bottom-4 z-40 backdrop-blur-md bg-opacity-95">
                <p class="text-xs text-slate-400 italic">* Pastikan semua 38 soalan dijawab sebelum menghantar.</p>
                <button type="submit" id="btnSubmit" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all text-xs outline-none cursor-pointer">
                    Hantar Ujian Pasca ke Awan
                </button>
            </div>
        </form>
    </main>

    <div id="toastContainer" class="fixed bottom-4 right-4 z-[110] flex flex-col gap-2 pointer-events-none"></div>

    <!-- LOGIK & SKRIP FIREBASE PASCA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzlcyG6xyd2JXEMRNlDGi-_wxU2TXf6Y8",
            authDomain: "propkes-2026.firebaseapp.com",
            databaseURL: "https://propkes-2026-default-rtdb.firebaseio.com",
            projectId: "propkes-2026",
            storageBucket: "propkes-2026.firebasestorage.app",
            messagingSenderId: "758954100529",
            appId: "1:758954100529:web:385531320681ceac8e9210"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const rawUser = localStorage.getItem("propkes_user") || "peserta1";
        const currentUser = rawUser.replace(/[^a-zA-Z0-9_-]/g, "_");

        const propkes38Questions = [
            { id: 1, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan dan kepimpinan organisasi]." },
            { id: 2, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan kurikulum]." },
            { id: 3, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan kokurikulum]." },
            { id: 4, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan hal ehwal murid]." },
            { id: 5, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan kewangan]." },
            { id: 6, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan pentadbiran pejabat]." },
            { id: 7, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan persekitaran dan kemudahan fizikal]." },
            { id: 8, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan dan pembangunan sumber manusia]." },
            { id: 9, text: "Saya memiliki [Pengetahuan mengenai bidang pengurusan perhubungan luar]." },
            { id: 10, text: "Saya memiliki [Pengalaman dalam sembilan bidang pengurusan dan kepimpinan sekolah]." },
            { id: 11, text: "Saya boleh [menggabung jalin antara teori pengurusan dan kepimpinan dengan amalan terbaik di sekolah bagi menghasilkan sesi latihan yang mantap dan berkesan]." },
            { id: 12, text: "Program PROPKES [akan meningkatkan pengetahuan dan kemahiran saya dalam bidang pengurusan dan kepimpinan pendidikan]." },
            { id: 13, text: "Ketua Jabatan/Mentor [memberi bimbingan dalam melaksanakan tugas di IAB]." },
            { id: 14, text: "Dasar dan Matlamat [Membina Visi]." },
            { id: 15, text: "Dasar dan Matlamat [Fokus kepada Kualiti]." },
            { id: 16, text: "Dasar dan Matlamat [Pemikiran Strategik]." },
            { id: 17, text: "Dasar dan Matlamat [Proaktif]." },
            { id: 18, text: "Instruksional dan Pencapaian [Berorientasikan Pencapaian]." },
            { id: 19, text: "Instruksional dan Pencapaian [Perancangan dan Pembangunan Instruksional]." },
            { id: 20, text: "Instruksional dan Pencapaian [Perkongsian Pengetahuan]." },
            { id: 21, text: "Instruksional dan Pencapaian [Menyelia Proses Pengajaran dan Pembelajaran]." },
            { id: 22, text: "Perubahan dan Inovasi [Penyelesaian Masalah]." },
            { id: 23, text: "Perubahan dan Inovasi [Mengurus Perubahan]." },
            { id: 24, text: "Perubahan dan Inovasi [Melaksanakan Penambahbaikan Sekolah]." },
            { id: 25, text: "Perubahan dan Inovasi [Kreativiti]." },
            { id: 26, text: "Hubungan Sesama Manusia [Membangun Kapasiti]." },
            { id: 27, text: "Hubungan Sesama Manusia [Komunikasi Berkesan]." },
            { id: 28, text: "Hubungan Sesama Manusia [Membina Jaringan dan Jalinan]." },
            { id: 29, text: "Hubungan Sesama Manusia [Membina Jaringan dan Jalinan]." },
            { id: 30, text: "Hubungan Sesama Manusia [Kerja Sepasukan]." },
            { id: 31, text: "Sumber dan Operasi [Pengurusan Kewangan]." },
            { id: 32, text: "Sumber dan Operasi [Merancang Pembangunan Fizikal dan Persekitaran Sekolah]." },
            { id: 33, text: "Sumber dan Operasi [Pengurusan ICT]." },
            { id: 34, text: "Sumber dan Operasi [Pengurusan Prestasi]." },
            { id: 35, text: "Keberkesanan Kendiri [Menyedari Kekuatan, Kelemahan dan Batasan Kendiri]." },
            { id: 36, text: "Keberkesanan Kendiri [Pengurusan Kendiri]." },
            { id: 37, text: "Keberkesanan Kendiri [Peka Terhadap Perasaan Dan Keperluan Orang Lain]." },
            { id: 38, text: "Keberkesanan Kendiri [Mempunyai Kebolehan Menyesuaikan Diri]." }
        ];

        const userAnswers = {};

        function renderQuestions() {
            const container = document.getElementById("questionsContainer");
            container.innerHTML = "";

            propkes38Questions.forEach(q => {
                let ratingButtons = "";
                for (let i = 1; i <= 10; i++) {
                    ratingButtons += `
                        <button type="button" onclick="window.selectRating(${q.id}, ${i})" id="btn_${q.id}_${i}" 
                            class="rating-btn-${q.id} flex-1 py-2.5 rounded-xl border border-slate-700 bg-slate-950 hover:border-purple-500 text-xs font-bold transition-all text-slate-300">
                            ${i}
                        </button>
                    `;
                }

                container.innerHTML += `
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg space-y-4">
                        <p class="text-xs font-bold text-white flex items-start gap-2">
                            <span class="text-purple-400 font-extrabold shrink-0">${q.id}.</span>
                            <span>${q.text}</span>
                        </p>
                        <div class="flex flex-wrap gap-1.5 sm:gap-2">
                            ${ratingButtons}
                        </div>
                        <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase px-1">
                            <span>Sangat Rendah (1)</span>
                            <span>Sangat Tinggi (10)</span>
                        </div>
                    </div>
                `;
            });
        }

        window.selectRating = function(qId, val) {
            userAnswers[qId] = val;
            
            document.querySelectorAll(`.rating-btn-${qId}`).forEach(btn => {
                btn.classList.remove('bg-purple-600', 'border-purple-500', 'text-white', 'shadow-lg');
                btn.classList.add('bg-slate-950', 'border-slate-700', 'text-slate-300');
            });

            const activeBtn = document.getElementById(`btn_${qId}_${val}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-950', 'border-slate-700', 'text-slate-300');
                activeBtn.classList.add('bg-purple-600', 'border-purple-500', 'text-white', 'shadow-lg');
            }

            const count = Object.keys(userAnswers).length;
            document.getElementById('progressCounter').textContent = `${count} / 38 Soalan`;
        };

        window.savePascaResults = async function(e) {
            e.preventDefault();

            const totalAnswered = Object.keys(userAnswers).length;
            if (totalAnswered < 38) {
                window.showToast(`Sila jawab semua 38 soalan. (Baru dijawab: ${totalAnswered}/38)`, 'warning');
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.textContent = "Menyimpan Hasil Ujian...";
            btn.disabled = true;

            const rawAnswers = {};
            for (let i = 1; i <= 38; i++) {
                rawAnswers[i] = Number(userAnswers[i]) || 0;
            }

            localStorage.setItem(`propkes_pasca_result_${currentUser}`, JSON.stringify(rawAnswers));

            try {
                await set(ref(db, `propkes_ipropkes/${currentUser}/pasca`), rawAnswers);
                window.showToast("Ujian Pasca berjaya dihantar dan disimpan ke awan!");
                
                setTimeout(() => {
                    window.location.href = "dashboard_peserta.html";
                }, 1500);

            } catch(err) {
                console.error("Ralat Firebase:", err);
                window.showToast("Keputusan disimpan secara tempatan.", "warning");
                setTimeout(() => {
                    window.location.href = "dashboard_peserta.html";
                }, 1500);
            }
        };

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            if(!container) return;
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-600' : (type === 'warning' ? 'bg-amber-600' : 'bg-rose-600');
            toast.className = `${bgColor} text-white px-4 py-3 rounded-xl shadow-xl text-sm font-medium transition-all duration-300 flex items-center gap-3 z-[200]`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        };

        renderQuestions();
    </script>
</body>
</html>
