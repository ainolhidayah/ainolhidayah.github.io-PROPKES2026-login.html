<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Peserta | PROPKES 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-pattern {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden p-8 relative">
        <!-- Hiasan Visual -->
        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500/10 blur-3xl rounded-full pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-12 h-12 bg-blue-500 text-white font-bold text-xl rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30 mx-auto mb-4">
                IAB
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Pendaftaran Peserta PROPKES</h2>
            <p class="text-sm text-slate-400">Pilih nama anda daripada senarai rasmi dan tetapkan kata laluan.</p>
        </div>

        <form id="registerForm" class="space-y-5 relative z-10">
            
            <!-- PILIH NAMA PESERTA -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Nama Penuh (Berdasarkan Pencalonan)</label>
                <select id="regName" required class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 outline-none cursor-pointer">
                    <option value="" disabled selected>-- Sila Pilih Nama Anda --</option>
                    <option value="KHAIRUL IZAD BIN ABD RAHMAN">KHAIRUL IZAD BIN ABD RAHMAN</option>
                    <option value="SURIA BINTI IBRAHIM">SURIA BINTI IBRAHIM</option>
                    <option value="DR MD NIZAM BIN NASIR">DR MD NIZAM BIN NASIR</option>
                    <option value="ROSZILAWATI BINTI ISMAIL">ROSZILAWATI BINTI ISMAIL</option>
                    <option value="DR MOHD YUSOF BIN MUSTAFFA KAMAL">DR MOHD YUSOF BIN MUSTAFFA KAMAL</option>
                    <option value="DR MOHD HAFEZ BIN KAMARUDIN">DR MOHD HAFEZ BIN KAMARUDIN</option>
                    <option value="DR.UMA THEVI A/P VETRIVEILMANY">DR.UMA THEVI A/P VETRIVEILMANY</option>
                    <option value="MOHD MALIM ESANUDDIN">MOHD MALIM ESANUDDIN</option>
                    <option value="ABD HALIB BIN MOHD ALI">ABD HALIB BIN MOHD ALI</option>
                    <option value="DR CAMMELIA OTHMAN">DR CAMMELIA OTHMAN</option>
                    <option value="SYAHIDA FARAH BINTI ABDUL RAHIM">SYAHIDA FARAH BINTI ABDUL RAHIM</option>
                    <option value="DR. HAJAH ROSNANI BINTI SAINI">DR. HAJAH ROSNANI BINTI SAINI</option>
                </select>
            </div>

            <!-- EMEL -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">E-mel Rasmi</label>
                <input type="email" id="regEmail" required placeholder="contoh@iab.edu.my" 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 placeholder-slate-600 outline-none">
            </div>

            <!-- KATA LALUAN BARU -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Cipta Kata Laluan</label>
                <input type="password" id="regPassword" required placeholder="Minimum 6 aksara" minlength="6"
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 placeholder-slate-600 outline-none">
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-emerald-600/30 transition-all mt-6 cursor-pointer outline-none">
                Daftar Akaun
            </button>

            <div class="text-center mt-4 border-t border-slate-800 pt-4">
                <p class="text-xs text-slate-400">Sudah mendaftar? <a href="index.html" class="text-blue-400 hover:text-blue-300 font-semibold">Log Masuk di sini</a></p>
            </div>
        </form>
    </div>

    <!-- Toast Notification Simulator -->
    <div id="toast" class="fixed bottom-4 right-4 bg-emerald-600 text-white px-6 py-4 rounded-lg shadow-2xl text-sm font-medium transition-all duration-500 transform translate-y-20 opacity-0 flex items-center gap-3 z-50">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        <div>
            <p class="font-bold">Pendaftaran Berjaya!</p>
            <p class="text-xs text-emerald-100">Maklumat log masuk telah dihantar ke e-mel anda.</p>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();

            // Ambil data dari form
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value.toLowerCase();
            const password = document.getElementById("regPassword").value;

            // Simpan pendaftaran ke localStorage (Simulasi Database)
            const pesertaData = {
                namaPenuh: name,
                emel: email,
                kataLaluan: password
            };
            
            // Simpan sebagai string dalam browser
            localStorage.setItem("propkes_registered_user", JSON.stringify(pesertaData));

            // Tunjuk simulasi e-mel berjaya dihantar (Toast)
            const toast = document.getElementById("toast");
            toast.classList.remove("translate-y-20", "opacity-0");
            
            // Bawa pengguna ke halaman log masuk selepas 3 saat
            setTimeout(() => {
                window.location.href = "index.html";
            }, 3000);
        });
    </script>
</body>
</html>
