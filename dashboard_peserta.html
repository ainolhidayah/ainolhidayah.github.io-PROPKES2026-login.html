    <script>
        // Papar nama dari localStorage jika pengguna telah mendaftar
        document.addEventListener("DOMContentLoaded", () => {
            const activeName = localStorage.getItem("propkes_active_peserta_name");
            
            if (activeName) {
                // Tukar format nama (contoh: KHAIRUL IZAD -> Khairul Izad)
                const formatName = activeName.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
                
                // Ambil pangkal nama untuk ucapan ringkas
                const firstName = formatName.split(' ')[0] || "Peserta";
                
                // Ambil inisial untuk bulatan avatar
                const initials = activeName.substring(0,2).toUpperCase();

                document.getElementById("navNameDisplay").textContent = formatName;
                document.getElementById("welcomeMessage").textContent = "Selamat Datang, " + firstName + "!";
                document.getElementById("navInitials").textContent = initials;
            }
        });
    </script>
