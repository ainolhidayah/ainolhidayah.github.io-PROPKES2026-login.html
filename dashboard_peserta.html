        function openPanduCitraModal() {
            const modal = document.getElementById('panduCitraModal');
            const content = document.getElementById('panduCitraModalContent');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.classList.add('opacity-100'); content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
        }

        function closePanduCitraModal() {
            const modal = document.getElementById('panduCitraModal');
            const content = document.getElementById('panduCitraModalContent');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0'); content.classList.remove('scale-100'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300);
        }

        document.getElementById('panduCitraForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Simpan Rekod Sesi Pandu Citra
            const date = document.getElementById('pcDate').value;
            const start = document.getElementById('pcStartTime').value;
            const end = document.getElementById('pcEndTime').value;
            const method = document.getElementById('pcMethod').value;
            const notes = document.getElementById('pcNotes').value;

            const sessionKey = `propkes_pc_sessions_${currentUser}`;
            let sessions = JSON.parse(localStorage.getItem(sessionKey) || "[]");
            
            sessions.push({ date, start, end, method, notes });
            localStorage.setItem(sessionKey, JSON.stringify(sessions));

            closePanduCitraModal();
            showToast("Rekod Sesi Pandu Citra berjaya disimpan.");
            
            // Set semula form
            e.target.reset();
        });
