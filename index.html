                <!-- BUTANG LOG MASUK -->
                <div class="space-y-3 mt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-blue-600/30 transition-all flex justify-center items-center gap-2 cursor-pointer outline-none">
                        Log Masuk
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault(); // Halang page refresh

            const usernameInput = document.getElementById("username").value.toLowerCase().trim();
            const passwordInput = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            // Sembunyikan mesej ralat
            errorMsg.classList.add("hidden");

            // 1. SEMAK AKAUN DINAMIK YANG DIDAFTARKAN OLEH ADMIN DARI MEMORI
            const registeredAccounts = JSON.parse(localStorage.getItem("propkes_accounts") || "{}");
            
            if (registeredAccounts[usernameInput] && registeredAccounts[usernameInput].password === passwordInput) {
                const userRole = registeredAccounts[usernameInput].role;
                const userName = registeredAccounts[usernameInput].name;
                
                // Simpan siapa yang sedang aktif untuk digunakan di dalam papan pemuka
                localStorage.setItem("propkes_active_user", usernameInput);
                localStorage.setItem("propkes_active_name", userName);
                localStorage.setItem("propkes_active_role", userRole);

                // Halakan ke papan pemuka yang tepat mengikut peranan yang didaftarkan
                if (userRole === "peserta") {
                    window.location.href = "dashboard_peserta.html";
                } else if (userRole === "pemandu") {
                    window.location.href = "dashboard_pemandu.html";
                } else if (userRole === "mentor") {
                    window.location.href = "dashboard_mentor.html";
                }
                return; // Berhenti di sini jika berjaya
            }

            // 2. LOGIK LOG MASUK LALAI (FALLBACK/DEMO) UNTUK PENGUJI SISTEM
            // Supaya anda tidak perlu daftar semua orang untuk menguji
            const defaultPassword = "123456";
            if (passwordInput !== defaultPassword) {
                errorMsg.classList.remove("hidden");
                return;
            }

            if (usernameInput === "admin") {
                window.location.href = "dashboard_admin.html";
            } else if (usernameInput.startsWith("peserta")) {
                window.location.href = "dashboard_peserta.html";
            } else if (usernameInput.startsWith("pemandu")) {
                window.location.href = "dashboard_pemandu.html";
            } else if (usernameInput === "mentor") {
                window.location.href = "dashboard_mentor.html";
            } else {
                errorMsg.classList.remove("hidden");
            }
        });
    </script>
</body>
